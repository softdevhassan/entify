name: Deploy Comparative NER to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.0
        with:
          # Exclude environment files, virtual environments, and git data
          switches: -avz --delete --exclude='.env' --exclude='venv' --exclude='.git' --exclude='.github' --exclude='__pycache__' --exclude='*.pyc'
          path: ./
          remote_path: /var/www/html/ner.orbin.dev/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Post-deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html/ner.orbin.dev

            # Setup/Activate virtual environment
            python3 -m venv ner
            source ner/bin/activate

            # Install updated requirements
            pip install --upgrade pip
            pip install -r requirements.txt

            # Restart the service (Assuming systemd/gunicorn setup)
            sudo systemctl restart gunicorn
            # Alternatively, if using a simple process manager or reload:
            # sudo systemctl restart ner_tool
